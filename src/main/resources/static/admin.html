<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Community Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            overflow-x: auto;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            color: #495057;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .dropdown {
            flex: 1;
            min-width: 200px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .form-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }

            .dropdown {
                width: 100%;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Admin Panel</h1>
            <p>Manage all Community Hub resources</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('communities')">Communities</button>
            <button class="tab" onclick="switchTab('categories')">Categories</button>
            <button class="tab" onclick="switchTab('subcategories')">Subcategories</button>
            <button class="tab" onclick="switchTab('providers')">Providers</button>
            <button class="tab" onclick="switchTab('services')">Services</button>
            <button class="tab" onclick="switchTab('recommendations')">Recommendations</button>
            <button class="tab" onclick="switchTab('community-services')">Community Services</button>
        </div>

        <!-- Communities Tab -->
        <div id="communities" class="tab-content active">
            <div class="message" id="communities-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Status:</span>
                <select id="communities-filter-status" onchange="filterCommunities()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="active">Active Only</option>
                </select>
                <span>City:</span>
                <select id="communities-filter-city" onchange="filterCommunities()" style="width: 150px;">
                    <option value="all">All</option>
                </select>
                <span>Area:</span>
                <select id="communities-filter-area" onchange="filterCommunities()" style="width: 150px;">
                    <option value="all">All</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('communities')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="communities-form"></div>
            <div class="table-container" id="communities-table"></div>
        </div>

        <!-- Categories Tab -->
        <div id="categories" class="tab-content">
            <div class="message" id="categories-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Status:</span>
                <select id="categories-filter-status" onchange="filterCategories()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="active">Active Only</option>
                </select>
                <span>Type:</span>
                <select id="categories-filter-type" onchange="filterCategories()" style="width: 150px;">
                    <option value="all">All</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('categories')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="categories-form"></div>
            <div class="table-container" id="categories-table"></div>
        </div>

        <!-- Subcategories Tab -->
        <div id="subcategories" class="tab-content">
            <div class="message" id="subcategories-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Status:</span>
                <select id="subcategories-filter-status" onchange="filterSubcategories()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="active">Active Only</option>
                </select>
                <span>Category:</span>
                <select id="subcategories-filter-category" onchange="filterSubcategories()" style="width: 200px;">
                    <option value="all">All</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('subcategories')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="subcategories-form"></div>
            <div class="table-container" id="subcategories-table"></div>
        </div>

        <!-- Providers Tab -->
        <div id="providers" class="tab-content">
            <div class="message" id="providers-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Status:</span>
                <select id="providers-filter-status" onchange="filterProviders()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="active">Active Only</option>
                </select>
                <span>City:</span>
                <select id="providers-filter-city" onchange="filterProviders()" style="width: 150px;">
                    <option value="all">All</option>
                </select>
                <span>Area:</span>
                <select id="providers-filter-area" onchange="filterProviders()" style="width: 150px;">
                    <option value="all">All</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('providers')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="providers-form"></div>
            <div class="table-container" id="providers-table"></div>
        </div>

        <!-- Services Tab -->
        <div id="services" class="tab-content">
            <div class="message" id="services-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Status:</span>
                <select id="services-filter-status" onchange="filterServices()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="active">Active Only</option>
                </select>
                <span>Provider:</span>
                <select id="services-filter-provider" onchange="filterServices()" style="width: 200px;">
                    <option value="all">All</option>
                </select>
                <span>Subcategory:</span>
                <select id="services-filter-subcategory" onchange="filterServices()" style="width: 200px;">
                    <option value="all">All</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('services')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="services-form"></div>
            <div class="table-container" id="services-table"></div>
        </div>

        <!-- Recommendations Tab -->
        <div id="recommendations" class="tab-content">
            <div class="message" id="recommendations-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filters:</span>
                <span>Community:</span>
                <select id="recommendations-filter-community" onchange="filterRecommendations()" style="width: 200px;">
                    <option value="all">All</option>
                </select>
                <span>Service:</span>
                <select id="recommendations-filter-service" onchange="filterRecommendations()" style="width: 200px;">
                    <option value="all">All</option>
                </select>
                <span>Status:</span>
                <select id="recommendations-filter-status" onchange="filterRecommendations()" style="width: 120px;">
                    <option value="all">All</option>
                    <option value="APPROVED">Approved</option>
                    <option value="PENDING">Pending</option>
                    <option value="REJECTED">Rejected</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('recommendations')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="recommendations-form"></div>
            <div class="table-container" id="recommendations-table"></div>
        </div>

        <!-- Community Services Tab -->
        <div id="community-services" class="tab-content">
            <div class="message" id="community-services-message"></div>
            <div class="controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span style="font-weight: 500;">Filter:</span>
                <span>Community:</span>
                <select id="community-services-select" onchange="loadCommunityServiceDetails()" style="width: 250px;">
                    <option value="">Select a community...</option>
                </select>
                <button class="btn btn-primary" onclick="showAddForm('community-services')" style="margin-left: auto;">+ Add New</button>
            </div>
            <div class="form-container" id="community-services-form"></div>
            <div class="table-container" id="community-services-table"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
