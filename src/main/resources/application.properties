# Server Configuration
server.port=8080

# H2 Database Configuration (File-based for data persistence)
spring.datasource.url=jdbc:h2:file:./data/communityhub
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize database with schema.sql (only if tables don't exist)
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# Application Configuration
spring.application.name=CommunityHub Backend

